<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="../css/forgot-password.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Lexend:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="forgot-password-container">
        <!-- Left Column: Forgot Password Form -->
        <div class="forgot-password-form-section">
            <div class="form-wrapper">
                <!-- Header Section -->
                <div class="header-section">
                    <h1 class="page-title">Forgot Password?</h1>
                    <p class="page-description">No need to panic. Simply enter the email address associated with your
                        account to receive reset instructions</p>
                </div>

                <!-- Form Section -->
                <div class="form-content">
                    <form id="forgotPasswordForm">
                        <!-- Email Input -->
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                                autocomplete="email" required>
                            <p class="error-message" id="errorMessage"></p>
                        </div>

                        <!-- Send Button -->
                        <button type="submit" class="btn-primary">Send</button>
                    </form>

                    <!-- Return to Login Link -->
                    <a href="index.html" class="return-link">
                        <svg class="back-arrow" width="16" height="13" viewBox="0 0 16 13" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M15.5771 6.49985L0.999878 6.49985M0.999878 6.49985L6.11103 11.611M0.999878 6.49985L6.11103 1.3887"
                                stroke="#8D8D8D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <span>Return to Login</span>
                    </a>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-bar-container">
                <div class="progress-bar">
                    <div class="progress-segment filled"></div>
                    <div class="progress-segment"></div>
                    <div class="progress-segment"></div>
                    <div class="progress-segment"></div>
                </div>
            </div>
        </div>

        <!-- Right Column: Splash Art -->
        <div class="splash-section">
            <div class="splash-content">
                <div class="logo-container">
                    <img src="../images/icon-ArcoLogo.svg" alt="Arco Logo">
                </div>
                <div class="footer-links">
                    <p class="copyright">© 2025-2026</p>
                    <a href="#" class="footer-link">FAQ</a>
                    <a href="#" class="footer-link">Contact</a>
                    <a href="#" class="footer-link">Policy</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/forgot-password.js"></script>
</body>

</html>
