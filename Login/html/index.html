<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account: Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Lexend:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="login-container">
        <!-- Left Column: Login Form -->
        <div class="login-form-section">
            <div class="form-wrapper">
                <!-- Header Section -->
                <div class="header-section">
                    <h1 class="login-title">Login</h1>
                    <a href="signup.html" class="link-text">New to Arco</a>
                </div>

                <!-- Form Section -->
                <div class="form-content">
                    <form id="loginForm">
                        <!-- Email Input -->
                        <div class="form-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                                autocomplete="email" required>
                        </div>

                        <!-- Password Input -->
                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="password" name="password" class="form-input"
                                    placeholder="ex123#@!" autocomplete="current-password" required>
                                <button type="button" class="password-toggle" id="passwordToggle"
                                    aria-label="Toggle password visibility">
                                    <svg class="eye-icon" width="20" height="20" viewBox="0 0 20 20" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <g transform="translate(0.25, 5.5)">
                                            <path
                                                d="M9.50011 3.99985C10.8808 3.99985 12.0001 5.11914 12.0001 6.49985C12 7.8805 10.8808 8.99985 9.50011 8.99985C8.11953 8.99975 7.00018 7.88044 7.00011 6.49985C7.00011 5.1192 8.11948 3.99995 9.50011 3.99985ZM5.69738 0.985203C7.66654 -0.102834 9.63242 -0.215738 11.4425 0.286961C14.9626 1.26478 17.811 4.53362 19.3575 7.11118C19.6415 7.58469 19.4882 8.1991 19.0148 8.48325C18.5413 8.76708 17.9269 8.61369 17.6427 8.14048C16.1892 5.71806 13.6871 2.98686 10.9073 2.2147C9.56762 1.84258 8.14571 1.91722 6.66515 2.7352C5.15658 3.56884 3.51583 5.21499 1.87023 8.11899C1.59782 8.59915 0.987297 8.76813 0.506945 8.49595C0.026624 8.22371 -0.141985 7.61308 0.129992 7.13266C1.88406 4.03727 3.75629 2.05795 5.69738 0.985203Z"
                                                fill="#1C1C1C" />
                                        </g>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <!-- Remember Me & Forgot Password -->
                        <div class="form-options">
                            <div class="remember-me">
                                <button type="button" class="toggle-switch" id="rememberToggle" role="switch"
                                    aria-checked="true">
                                    <span class="toggle-slider"></span>
                                </button>
                                <label for="rememberToggle" class="toggle-label">Remember Me?</label>
                            </div>
                            <a href="forgot-password.html" class="link-text">Forgot Password</a>
                        </div>

                        <!-- Login Button -->
                        <button type="submit" class="btn-primary">Login</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Right Column: Splash Art -->
        <div class="splash-section">
            <div class="splash-content">
                <div class="logo-container">
                    <img src="../images/icon-ArcoLogo.svg" alt="Arco Logo">
                </div>
                <div class="footer-links">
                    <p class="copyright">© 2025-2026</p>
                    <a href="#" class="footer-link">FAQ</a>
                    <a href="#" class="footer-link">Contact</a>
                    <a href="#" class="footer-link">Policy</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="../js/js.js"></script>
</body>

</html>
