<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Creation - Name</title>
    <link rel="stylesheet" href="../css/account-creation.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Lexend:wght@400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="creation-container">
        <!-- Left Column: Splash Art -->
        <div class="splash-section">
            <div class="splash-content">
                <div class="logo-container">
                    <img src="../images/icon-ArcoLogo.svg" alt="Arco Logo">
                </div>
                <div class="footer-links">
                    <p class="copyright">© 2025-2026</p>
                    <a href="#" class="footer-link">FAQ</a>
                    <a href="#" class="footer-link">Contact</a>
                    <a href="#" class="footer-link">Policy</a>
                </div>
            </div>
        </div>

        <!-- Right Column: Account Creation Form -->
        <div class="creation-form-section">
            <div class="form-wrapper">
                <div class="form-content">
                    <!-- Header and Description -->
                    <div class="header-content">
                        <h1 class="creation-title">What is Your First Name?</h1>
                        <p class="creation-description">You have to call yourself something, after all. Enter the
                            Display Name you want your profile to go by. Get real creative with it!</p>
                    </div>

                    <!-- Display Name Input -->
                    <div class="form-group">
                        <label for="displayName" class="form-label">Display Name</label>
                        <input type="text" id="displayName" name="displayName" class="form-input"
                            placeholder="ex: Jane Doe" required>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="action-section">
                    <button type="button" class="btn-primary" id="continueBtn" disabled>Continue</button>
                    <div class="previous-link" id="returnLink">
                        <div class="previous-arrow">
                            <svg width="16" height="13" viewBox="0 0 16 13" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M15.5771 6.49985C15.5771 6.7985 15.4584 7.08503 15.2459 7.29753C15.0334 7.51003 14.7468 7.62873 14.4482 7.62873H3.93149L8.19656 11.8938C8.40906 12.1063 8.52776 12.3928 8.52776 12.6915C8.52776 12.9901 8.40906 13.2767 8.19656 13.4892C7.98406 13.7017 7.69753 13.8204 7.39887 13.8204C7.10021 13.8204 6.81368 13.7017 6.60118 13.4892L0.331299 7.21929C0.225684 7.11384 0.141942 6.98829 0.0849983 6.85013C0.0280547 6.71196 -0.00146484 6.56395 -0.00146484 6.41473C-0.00146484 6.26551 0.0280547 6.11749 0.0849983 5.97933C0.141942 5.84116 0.225684 5.71561 0.331299 5.61017L6.60118 -0.659714C6.70665 -0.765252 6.83221 -0.84895 6.97038 -0.905855C7.10855 -0.96276 7.25657 -0.992657 7.40581 -0.992625C7.55504 -0.992593 7.70307 -0.962634 7.84123 -0.905669C7.97939 -0.848704 8.10494 -0.764943 8.21037 -0.659344C8.31579 -0.553746 8.39949 -0.428185 8.4564 -0.290016C8.5133 -0.151848 8.5432 -0.00382826 8.54317 0.145408C8.54313 0.294644 8.51317 0.442661 8.45621 0.580824C8.39924 0.718986 8.31549 0.844537 8.21002 0.950114L3.93149 5.21097H14.4482C14.7468 5.21097 15.0334 5.32967 15.2459 5.54217C15.4584 5.75467 15.5771 6.0412 15.5771 6.33985V6.49985Z"
                                    fill="#8d8d8d" />
                            </svg>
                        </div>
                        <p class="previous-text">Return to Sign Up</p>
                    </div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-bar-container">
                <div class="progress-bar">
                    <div class="progress-segment active"></div>
                    <div class="progress-segment"></div>
                    <div class="progress-segment"></div>
                    <div class="progress-segment"></div>
                </div>
            </div>

        </div>


    </div>

    <script src="../../Home/js/api.js"></script>
    <script src="../js/account-creation.js"></script>
</body>

</html>
