<div class="contact-panel">
    <div class="contact-form-section">
        <form class="contact-form" id="contact-form">
            <div class="contact-field">
                <label for="contact-name" class="contact-label">Name</label>
                <input type="text" id="contact-name" name="name" class="contact-input" placeholder="John Doe">
            </div>
            <div class="contact-field">
                <label for="contact-email" class="contact-label">Email</label>
                <input type="email" id="contact-email" name="email" class="contact-input"
                    placeholder="defaultemail@gmail.com">
            </div>
            <div class="contact-field">
                <label for="contact-message" class="contact-label">Your Message</label>
                <textarea id="contact-message" name="message" class="contact-textarea" rows="5"
                    placeholder="Type your message here..."></textarea>
            </div>
            <button type="submit" class="contact-submit">Submit Message</button>
        </form>
    </div>
    <div class="contact-info-section">
        <div class="contact-illustration" aria-hidden="true">
        </div>
        <div class="contact-details">
            <a href="mailto:support@arco.com" class="contact-detail">
                <img class="contact-detail-icon" src="../images/email.svg" alt="Email Icon">
                support@arco.com
            </a>
            <a href="https://linkedin.com/company/ArcoOfficial" target="_blank" rel="noopener noreferrer"
                class="contact-detail">
                <img class="contact-detail-icon" src="../images/linkedin.svg" alt="LinkedIn Icon">
                @ArcoOfficial
            </a>
        </div>
    </div>
</div>
