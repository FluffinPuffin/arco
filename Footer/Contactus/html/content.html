<div class="contact-panel">
    <div class="contact-form-section">
        <form class="contact-form" id="contact-form">
            <div class="contact-field">
                <label for="contact-name" class="contact-label">Name</label>
                <input type="text" id="contact-name" name="name" class="contact-input" placeholder="John Doe">
            </div>
            <div class="contact-field">
                <label for="contact-email" class="contact-label">Email</label>
                <input type="email" id="contact-email" name="email" class="contact-input" placeholder="defaultemail@gmail.com">
            </div>
            <div class="contact-field">
                <label for="contact-message" class="contact-label">Your Message</label>
                <textarea id="contact-message" name="message" class="contact-textarea" rows="5" placeholder="Type your message here..."></textarea>
            </div>
            <button type="submit" class="contact-submit">Submit Message</button>
        </form>
    </div>
    <div class="contact-info-section">
        <div class="contact-illustration" aria-hidden="true">
            <svg width="120" height="100" viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="40" cy="50" r="20" stroke="#ccc" stroke-width="2" fill="#f5f5f5"/>
                <circle cx="80" cy="50" r="20" stroke="#ccc" stroke-width="2" fill="#f5f5f5"/>
                <path d="M35 45 L50 55 L65 45" stroke="#999" stroke-width="2" fill="none"/>
                <rect x="55" y="35" width="30" height="20" rx="2" stroke="#ccc" stroke-width="2" fill="#fff"/>
                <line x1="60" y1="45" x2="75" y2="45" stroke="#999" stroke-width="1"/>
            </svg>
        </div>
        <div class="contact-details">
            <a href="mailto:Email@email.com" class="contact-detail">
                <svg class="contact-detail-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                </svg>
                Email@email.com
            </a>
            <a href="mailto:arcosupport@gmail.com" class="contact-detail">
                <svg class="contact-detail-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                    <polyline points="22,6 12,13 2,6"/>
                </svg>
                arcosupport@gmail.com
            </a>
            <a href="https://linkedin.com/company/ArcoOfficial" target="_blank" rel="noopener noreferrer" class="contact-detail">
                <svg class="contact-detail-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                    <rect x="2" y="9" width="4" height="12"/>
                    <circle cx="4" cy="4" r="2"/>
                </svg>
                @ArcoOfficial
            </a>
        </div>
    </div>
</div>
