<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--<link rel="stylesheet" href="../../frame/css/style.css">-->
    <link rel="stylesheet" href="../css/style.css">
    <title>Free Play</title>

</head>

<body>

    <!--header div-->
    <div></div>

    <!--container div-->
    <div class="frame">
        <!--home and back buttons div-->
        <div class="buttons">
            <!--back button-->
            <img src="../../frame/images/arrow.svg" alt="Back" class="arrow" onclick="goBack()"
                style="cursor: pointer;">

            <!--freeplay header-->
            <h1>Free Play</h1>

            <!--home button-->
            <a href="../../Home/html/index.html">
                <img src="../../frame/images/home.svg" alt="home" class="home">
            </a>
        </div>


        <!--interactive windows div-->
        <div class="container">
            <div class="rectangle">
                <!--violin fingerboard section div-->
                <div>
                    <!--violin fingerboard image div-->
                    <div id="violinFingerboard">
                        <!--violin fingerboard image-->
                        <img src="../images/musicalStaffNotes/violinUnmarkedFingerboard.svg"
                            alt="An image of a violin fingerboard from top view, showing three tapes.">
                    </div>
                </div>

                <!--note displayed section div-->
                <div>
                    <!--note displayed image and note description div-->
                    <div id="musicalStaff">
                        <!--note displayed image-->
                        <img src="../images/musicalStaffNotes/blankMusicalStaff.svg"
                            alt="An image of the musical staff, blank with no note displayed">
                        <!--paragraph to put the related explanation into-->
                        <p></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!--footer div-->
    <div></div>
</body>

</html>
